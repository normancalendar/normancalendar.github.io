<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shared Week Calendar</title>

  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="app.js"></script>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <div class="app-shell">
    <header class="topbar">
      <div class="brand-wrap">
        <div class="logo" aria-label="Calendar logo">
          <svg viewBox="0 0 64 64" fill="none" aria-hidden="true">
            <rect x="10" y="14" width="44" height="40" rx="12" stroke="currentColor" stroke-width="4"/>
            <path d="M20 10V22" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
            <path d="M44 10V22" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
            <path d="M10 26H54" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <p class="eyebrow">Shared schedule</p>
          <h1>Week calendar</h1>
        </div>
      </div>

      <div class="topbar-actions">
        <button class="icon-btn" id="todayBtn" type="button">Today</button>
        <button class="icon-btn" id="themeToggle" type="button" aria-label="Switch theme">
          <span class="theme-icon">◐</span>
        </button>
      </div>
    </header>

    <main id="main" class="main">
      <section class="hero-card">
        <div class="week-controls">
          <div class="nav-wrapper">
  <button class="nav-btn" id="prevWeekBtn" type="button">←</button>
  <span class="nav-badge" id="prevBadge"></span>
</div>

<div>
  <p class="eyebrow">Current view</p>
  <h2 id="weekLabel">Week</h2>
</div>

<div class="nav-wrapper">
  <button class="nav-btn" id="nextWeekBtn" type="button">→</button>
  <span class="nav-badge" id="nextBadge"></span>
</div>

        <div class="hero-actions">
          <button class="primary-btn" id="newEventBtn" type="button">+ New event</button>
          <p class="sync-status" id="syncStatus">Connecting…</p>
        </div>
      </section>

      <section class="calendar-panel" aria-label="Weekly calendar">
        <div class="week-grid" id="weekGrid"></div>
      </section>
    </main>
  </div>

  <dialog class="event-modal" id="eventModal">
    <form class="event-form" id="eventForm" method="dialog">
      <div class="modal-head">
        <div>
          <p class="eyebrow">Schedule item</p>
          <h3 id="modalTitle">New event</h3>
        </div>
        <button class="close-btn" id="closeModalBtn" type="button" aria-label="Close">✕</button>
      </div>

      <input type="hidden" id="eventId" />

      <label>
        <span>Title</span>
        <input id="titleInput" name="title" type="text" maxlength="120" required placeholder="Team check-in" />
      </label>

      <label>
        <span>Details</span>
        <textarea id="detailsInput" name="details" rows="3" placeholder="Optional notes"></textarea>
      </label>

      <div class="form-row">
        <label>
          <span>Start</span>
          <input id="startInput" name="start" type="datetime-local" required />
        </label>

        <label>
          <span>End</span>
          <input id="endInput" name="end" type="datetime-local" required />
        </label>
      </div>

      <label>
        <span>Colour</span>
        <input id="colorInput" name="color" type="color" value="#01696f" />
      </label>

      <p class="form-error" id="formError" role="alert"></p>

      <div class="modal-actions">
        <button class="danger-btn hidden" id="deleteBtn" type="button">Delete</button>
        <div class="action-group">
          <button class="ghost-btn" id="cancelBtn" type="button">Cancel</button>
          <button class="primary-btn" id="saveBtn" type="submit">Save event</button>
        </div>
      </div>
    </form>
  </dialog>
</body>
</html>
