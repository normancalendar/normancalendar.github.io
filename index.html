<!DOCTYPE html>
<html lang="en">
<head> 
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Shared Calendar</title>
  
  <link rel="stylesheet" href="./style.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script defer src="./app.js"></script>
</head>

<body>

  <div id="app">
    
    <!-- HEADER -->
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark"></div>
        <h1>Shared Calendar</h1>
      </div>

      <button id="newEventBtn" class="btn-primary">+ New</button>
    </header>

    <!-- CONTROLS -->
    <main>
      <div class="controls-panel">
        <div class="view-controls">
          <button id="prevBtn" class="icon-btn">←</button>
          <button id="todayBtn" class="btn-secondary">Today</button>
          <button id="nextBtn" class="icon-btn">→</button>
          <h2 id="currentLabel"></h2>
        </div>
      </div>

      <!-- CALENDAR -->
      <div class="calendar-panel">
        <div id="calendarHeader" class="calendar-grid-header"></div>
        <div id="calendarGrid" class="calendar-grid"></div>
      </div>
    </main>

  </div>

  <!-- EVENT MODAL -->
  <div id="eventModal" class="modal hidden">
    <div class="modal-card">
      
      <div class="modal-header">
        <h3 id="modalTitle">New Event</h3>
        <button id="closeModalBtn">✕</button>
      </div>

      <form id="eventForm" class="event-form">
        <input type="hidden" id="eventId" />

        <input id="titleInput" type="text" placeholder="Event title" required />
        <textarea id="descriptionInput" placeholder="Description"></textarea>

        <input id="startInput" type="datetime-local" required />
        <input id="endInput" type="datetime-local" required />

        <div class="modal-actions">
          <button type="button" id="deleteBtn" class="btn-secondary hidden">Delete</button>
          <button type="button" id="cancelBtn" class="btn-secondary">Cancel</button>
          <button type="submit" class="btn-primary">Save</button>
        </div>
      </form>

    </div>
  </div>

</body>
</html>
