<div id="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark"></div>
      <div>
        <h1>Shared Calendar</h1>
        <p>Modern team scheduling</p>
      </div>
    </div>

    <div class="topbar-actions">
      <button id="newEventBtn" class="btn btn-primary" disabled>New event</button>
      <button id="authBtn" class="btn btn-secondary">Sign in</button>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <section class="panel">
        <h2>Your calendars</h2>
        <div id="calendarList" class="calendar-list"></div>
      </section>

      <section class="panel">
        <h2>User</h2>
        <div id="userInfo" class="user-info">Not signed in</div>
      </section>
    </aside>

    <section class="main-content">
      <div class="panel controls-panel">
        <div class="view-controls">
          <button id="prevBtn">←</button>
          <button id="todayBtn">Today</button>
          <button id="nextBtn">→</button>
          <h2 id="currentLabel"></h2>
        </div>
      </div>

      <div class="calendar-panel">
        <div id="calendarHeader"></div>
        <div id="calendarGrid"></div>
      </div>
    </section>
  </main>
</div>
