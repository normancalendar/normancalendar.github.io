<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calendar</title>

  <link rel="stylesheet" href="style.css"/>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="app.js"></script>
</head>

<body>

<header class="topbar">
  images/logo-left.png

  <h1>2027 Year of the Normans</h1>

  images/logo-right.png
</header>

<main>

<div class="controls">
  <button id="newEventBtn">+ New Event</button>
</div>

<div class="month-header">
  <div>Event</div>
  <div>Venue / Location</div>
  <div>Lead Organisation</div>
  <div>Contact</div>
</div>

<div id="monthView"></div>

</main>

<!-- MODAL (unchanged) -->
<dialog id="eventModal">
  <form id="eventForm">
    <input type="hidden" id="eventId">

    <input id="titleInput" placeholder="Title" required />
    <input id="detailsInput" placeholder="Venue / Location" />
    <input id="startInput" type="datetime-local" required />
    <input id="endInput" type="datetime-local" required />
    <input id="colorInput" type="color" value="#01696f"/>

    <button type="submit">Save</button>
    <button type="button" id="deleteBtn">Delete</button>
  </form>
</dialog>

</body>
</html>
