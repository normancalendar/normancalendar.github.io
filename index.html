<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>2027 Year of the Normans Calendar</title>

  <link rel="stylesheet" href="style.css"/>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="app.js"></script>
</head>

<body>

<header class="topbar">
  <img src="images/logo-left.png" class="logo-img">
  <h1>2027 Year of the Normans Calendar of Events</h1>
  <img src="images/logo-right.png" class="logo-img">

</header>

<main>

<div class="controls">
  <button id="newEventBtn">+ New Event</button>
  <button id="backupBtn">Download Backup</button>
  <input id="searchInput" placeholder="Search events..." />
</div>

<div class="month-header">
  <div>Event</div>
  <div>Venue / Location</div>
  <div>Lead Organisation</div>
  <div>Contact</div>
</div>

<div id="monthView"></div>

<div id="toast" class="hidden"></div>
  
</main>

<!-- MODAL (unchanged) -->
<dialog id="eventModal">
  <form id="eventForm">
    <input type="hidden" id="eventId">

    <input id="titleInput" placeholder="Title" required />
    <input id="detailsInput" placeholder="Venue / Location" />
    <input id="leadInput" placeholder="Lead Organisation" />
    <input id="contactInput" placeholder="Contact Info" />  
    <input id="noteInput" placeholder="Note (optional)" />
    <input id="startInput" type="datetime-local" required />
    <input id="endInput" type="datetime-local" required />
    <input id="colorInput" type="color" value="#01696f"/>

    <button type="submit">Save</button>
    <button type="button" id="deleteBtn">Delete</button>
  </form>
</dialog>

</body>
</html>
